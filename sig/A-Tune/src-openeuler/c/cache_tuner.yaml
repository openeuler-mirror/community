name: cache_tuner
description: cache_tuner provides a set of cache-related performance tuning tools, including the L0 memory allocator and cache stash management tools. These tools optimize data locality and reduce memory latency by providing finer control over cache behavior, memory allocation, and data layout, thereby enhancing cache isolation and prefetching.
