name: TSB-agent
description: The Trusted Software Base Agent (TSB-agent) operates within the OS to
  build an active immune defense system based on the Root of Trust, enhancing terminal
  security. It handles element collection, communication, and control execution, serving
  as a core component of Initiative Trusted Computing. Its goal is to align OS trusted
  functions with Initiative Trusted Computing requirements, drive community engagement,
  and evolve with OS and trusted computing technologies.
